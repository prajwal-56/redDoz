<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick PDF Finder</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .container { text-align: center; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #4285F4; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Book to PDF Search</h2>
    <input type="text" id="userInput" placeholder="Enter book title...">
    <button onclick="executeSearch()">Search PDF</button>
</div>

<script>
    function executeSearch() {
        // 1. Get the value from the textbox
        const query = document.getElementById('userInput').value;

        if (query.trim() === "") {
            alert("Please enter something first!");
            return;
        }

        // 2. Define your "custom" addition
        const customSuffix = " filetype:pdf";

        // 3. Combine and encode for a URL
        // encodeURIComponent ensures spaces become '+' or '%20'
        const finalQuery = encodeURIComponent(query + customSuffix);

        // 4. Redirect the user
        window.location.href = `https://www.google.com/search?q=${finalQuery}`;
    }
</script>

</body>
</html>
