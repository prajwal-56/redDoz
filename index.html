<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reddox: A precision tool for finding specific Reddit users across the web.">
    <title>Reddox | Advanced Reddit Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <header>
            <h1>Reddox</h1>
            <h2>Precision search for Reddit users. Find the digital footprint of any username.</h2>
        </header>
        
        <div class="search-card">
            <div class="input-wrapper">
                <input type="text" id="redditUsername" placeholder="Reddit Username (e.g. u/spez)..." autocomplete="off">
            </div>

            <div class="search-options">
                <span class="option-chip active" id="opt-all">All</span>
                <span class="option-chip" id="opt-posts">Posts</span>
                <span class="option-chip" id="opt-comments">Comments</span>
            </div>

            <div class="button-group">
                <button id="searchBtn" class="btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search Google
                </button>
                <button id="copyBtn" class="btn-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                    Copy Link
                </button>
            </div>
            
            <div id="result-area"></div>

            <div class="search-history">
                <div class="history-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Recent Searches
                </div>
                <div id="history-list" class="history-list">
                    <!-- History items will be injected here -->
                </div>
            </div>
        </div>

        <footer style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-secondary);">
            <p>Searches are performed via Google using dorking techniques.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
